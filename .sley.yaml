# sley configuration file
# Documentation: https://github.com/indaco/sley
# Generated by 'sley discover'

# Enabled plugins:
#   - commit-parser
#   - tag-manager
#   - dependency-check

path: .version
plugins:
  commit-parser: true
  tag-manager:
    enabled: true
  # Generates changelogs from git commits
  changelog-generator:
    enabled: true
    repository:
      auto-detect: true
    use-default-icons: true
    contributors:
      enabled: true
  dependency-check:
    enabled: true
    auto-sync: true
    files:
      - path: package.json
        field: version
        format: json
      - path: _examples/mode-bundle/package.json
        field: version
        format: json
      - path: package/package.json
        field: version
        format: json
      - path: website/package.json
        field: version
        format: json
